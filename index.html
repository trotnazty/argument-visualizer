<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argument Visualizer</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-title">
      <span class="app-icon">⊢</span>
      <span>Argument Visualizer</span>
    </div>
    <div class="header-btns">
      <button id="palette-toggle" class="theme-btn">❄ Nord</button>
      <button id="theme-toggle" class="theme-btn">☀ Light</button>
    </div>
  </header>

  <main class="app-main">
    <div class="board-root">
      <div class="topic-bar" id="topic-bar">
        <label class="topic-label" for="topic-input">Today's Argument</label>
        <input type="text" class="topic-input" id="topic-input" placeholder="Enter the topic of discussion…" />
        <button class="restart-btn" id="restart-btn" tabindex="-1" title="Clear all content (keeps topic)">Restart</button>
      </div>
      <div id="board-root-inner"></div>
    </div>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
